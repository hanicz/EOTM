<p-menubar [model]="items">
    <ng-template pTemplate="start">
        <h2 class="logo">
            Eye OTM <i class="fas fa-search-dollar"></i>
        </h2>
    </ng-template>
    <ng-template pTemplate="end">
        <div class="toolbar">
            <ng-container *ngFor="let type of currencyTypes">
                <label [for]="type.id">{{ type.label }}</label>
                <p-dropdown 
                    [inputId]="type.id"
                    [options]="globals.currencies"
                    [(ngModel)]="selectedCurrencies[type.key]"
                    optionLabel="label" 
                    optionValue="value"
                    (onChange)="onCurrencyChange(type.key)">
                </p-dropdown>
            </ng-container>
            <div class="user-section">
                <span>{{ user.email }}</span>
                <button 
                    pButton 
                    pRipple 
                    type="button" 
                    icon="pi pi-sign-out" 
                    (click)="logOut()"
                    class="p-button-rounded p-button-text">
                </button>
            </div>
        </div>
    </ng-template>
</p-menubar>
