<p-menubar [model]="items">
  <ng-template pTemplate="start">
    <img class="logo" [src]="assetUrl + 'logo-horizontal.png'" alt="Eye OTM">
  </ng-template>
  <ng-template pTemplate="end">
    <div class="toolbar">
      <div class="user-section">
        <span>{{ user.email }}</span>
        <button
          pButton
          pRipple
          type="button"
          icon="pi pi-sign-out"
          (click)="logOut()"
          class="p-button-rounded p-button-primary">
        </button>
      </div>
    </div>
  </ng-template>
</p-menubar>
